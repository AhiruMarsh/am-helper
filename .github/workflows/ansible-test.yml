name: Ansible CI (Test)

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  queue: max

env:
  DEVCONTAINER_IMAGE_NAME: ghcr.io/${{ github.repository }}/devcontainer

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Convert image name (lowercase)
        run: echo "DEVCONTAINER_IMAGE_NAME=${DEVCONTAINER_IMAGE_NAME,,}" >> $GITHUB_ENV   

      - name: Set image tag
        id: set_image_tag
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: echo "devcontainer_image_tag=$(echo "${TARGET_BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT

      - name: Create host_vars for localhost
        run: |
          cat > ansible/host_vars/localhost <<'EOF'
          hostname: ci
          platform_name: ci
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Ansible playbook in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.DEVCONTAINER_IMAGE_NAME }}
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE_NAME }}
          imageTag: ${{ steps.set_image_tag.outputs.devcontainer_image_tag }}
          push: always
          runCmd: ansible-playbook ansible/main.yml --become
