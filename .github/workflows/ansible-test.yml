name: Ansible CI (Test)

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVCONTAINER_IMAGE: ghcr.io/${{ github.repository }}/devcontainer

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          IMAGE_TAG=$(echo "${HEAD_BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "DEVCONTAINER_IMAGE=${DEVCONTAINER_IMAGE,,}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Create host_vars for localhost
        run: |
          cat > ansible/host_vars/localhost <<'EOF'
          hostname: ci
          platform_name: ci
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Ansible playbook in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.DEVCONTAINER_IMAGE }}
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          push: always
          runCmd: |
            ansible-playbook ansible/main.yml --become
