# app Settings (palworld)

# vars example
# vars:
#    pal_join_fqdn: string (optional)
#    pal_server_password: string
#    pal_admin_password: string
#    pal_discord_webhook_url: string (optional)
---
- name: Palworld - Create directory
  ansible.builtin.file:
    path: "/opt/a-marsh/palworld"
    state: directory
    owner: "am-helper"
    group: "am-helper"
    mode: "0755"

- name: Palworld - Create config
  ansible.builtin.template:
    src: "compose.yml"
    dest: "/opt/a-marsh/palworld/compose.yml"
    owner: "am-helper"
    group: "am-helper"
    mode: "0644"
  register: palworld_set_game_config

- name: Palworld - Create systemd service
  ansible.builtin.template:
    src: "palworld.service"
    dest: "/etc/systemd/system/palworld.service"
    owner: "am-helper"
    group: "am-helper"
    mode: "0644"
  register: palworld_set_systemd_config

- name: Palworld - Restart systemd service if changed
  ansible.builtin.systemd:
    name: "palworld.service"
    daemon-reload: true
    state: restarted
    enabled: true
  when:
    - ansible_facts['virtualization_type'] | default('') not in ['docker', 'lxc', 'podman', 'container']
    - palworld_set_game_config.changed or palworld_set_systemd_config.changed
