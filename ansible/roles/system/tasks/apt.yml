# apt settings
---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  become: true
  when: ansible_facts['distribution'] == "Ubuntu"

- name: Set config unattended-upgrades
  ansible.builtin.template:
    src: "apt/100-generated-ansible.conf"
    dest: "/etc/apt/apt.conf.d/100-generated-ansible.conf"
    owner: "root"
    group: "root"
    mode: "0644"
  become: true
  register: system_set_config
  when: ansible_facts['distribution'] == "Ubuntu"

- name: Reload service unattended-upgrades
  ansible.builtin.systemd:
    name: "unattended-upgrades.service"
    enabled: true
    state: "restarted"
  become: true
  when: system_set_config.changed
