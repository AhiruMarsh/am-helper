# apt settings
---
- name: Apt - Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
  become: true
  when: ansible_facts['distribution'] == "Ubuntu"

- name: Apt - Set config unattended-upgrades
  ansible.builtin.template:
    src: "apt/100-generated-ansible.conf"
    dest: "/etc/apt/apt.conf.d/100-generated-ansible.conf"
    owner: "root"
    group: "root"
    mode: "0644"
  become: true
  when: ansible_facts['distribution'] == "Ubuntu"
  notify: "Apt - Reload service unattended-upgrades"
