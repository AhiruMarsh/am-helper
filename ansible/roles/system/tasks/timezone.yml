# Linux timezone Settings

# vars example
# vars:
#   timezone: string
---
- name: Timezone - Check timezone
  ansible.builtin.shell: timedatectl status | grep Asia/Tokyo
  register: system_current_timezone
  changed_when: system_current_timezone.rc == 1
  failed_when: system_current_timezone.rc not in [0,1]

- name: Timezone - Change timezone if changed
  ansible.builtin.shell: timedatectl set-timezone Asia/Tokyo
  when: system_current_timezone.rc == 1
