services:
  app:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/minecraft_router.js:/etc/nginx/minecraft_router.js:ro
      - ./data/log:/var/log/nginx
      - /etc/timezone:/etc/timezone:ro
    network_mode: host
    pid: host
    restart: always

  exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - --nginx.scrape-uri=http://app:8080/stub_status
    volumes:
      - /etc/timezone:/etc/timezone:ro
    restart: always
    depends_on:
      - nginx

  cloudflared:
    image: cloudflare/cloudflared:latest
    volumes:
      - /etc/timezone:/etc/timezone:ro
    command: tunnel run --token "{{ nginx_cloudflared_token }}"
    restart: always
    depends_on:
      - exporter
