load_module modules/ngx_stream_js_module.so;

worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  resolver 8.8.8.8 valid=30s;

  # backend endpoint for prometheus.a-marsh.net
  split_clients $request_id $prometheus_upstream {
    50%  "prometheus-01.a-marsh.net";
    *    "prometheus-02.a-marsh.net";
  }

  # stub_status endpoint for Prometheus exporter
  server {
    listen 8080;
    location /stub_status {
      stub_status;
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      deny all;
    }
  }

  # Load balancer for prometheus.a-marsh.net (localhost:8082)
  server {
    listen 8082;

    location / {
      proxy_pass https://$prometheus_upstream;
      proxy_ssl_server_name on;
      proxy_ssl_name $prometheus_upstream;

      proxy_set_header Host                    $prometheus_upstream;
      proxy_set_header CF-Access-Client-Id     "8d91f52eb1bf485189d0525137105827.access";
      proxy_set_header CF-Access-Client-Secret "{{ rpx_client_secret_token }}";

      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header   Connection "";

      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_send_timeout    60s;
    }
  }
}

stream {
  log_format basic '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received $session_time "$upstream_addr"';
  access_log /var/log/nginx/access.log basic;

  resolver 8.8.8.8 valid=30s;

  js_import /etc/nginx/minecraft_router.js;
  js_var $minecraft_server;

  # # Minecraft Java domain → backend mapping
  # # Unknown domains are rejected by proxying to a closed local port (ECONNREFUSED)
  map $minecraft_server $minecraft_backend {
    "dev.mc.a-marsh.net"   oci-dev-sv01.a-marsh.net:25565;
    "mc.a-marsh.net"       oci-mc-sv01.a-marsh.net:25565;
    "edion.mc.a-marsh.net" kagoya-mc-edion-sv01.a-marsh.net:25565;
    default                127.0.0.1:1;
  }

  # Use map to defer DNS resolution to request time via resolver (avoid startup failure)
  map $server_port $palworld_backend {
    8211  "kagoya-pal-sv01.a-marsh.net:8211";
    27015 "kagoya-pal-sv01.a-marsh.net:27015";
    default "kagoya-pal-sv01.a-marsh.net:8211";
  }

  # Minecraft Java Edition (TCP) - domain-based routing via handshake inspection
  server {
    listen 25565;
    js_preread minecraft_router.preread;
    proxy_pass $minecraft_backend;
    proxy_connect_timeout 5s;
    proxy_timeout 10m;
  }

  # Palworld (UDP)
  server {
    listen 8211 udp;
    listen 27015 udp;
    proxy_pass $palworld_backend;
    proxy_connect_timeout 5s;
    proxy_timeout 10m;
  }
}
