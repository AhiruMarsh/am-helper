load_module modules/ngx_stream_js_module.so;

worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  resolver 1.1.1.1 valid=30s ipv6=off;

  log_format basic_http '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
  access_log /var/log/nginx/access.http.log basic_http;

  # Allow only Cloudflare Tunnel (localhost and Docker internal network)
  allow 127.0.0.1;
  allow 172.16.0.0/12;
  deny all;

  include /etc/nginx/conf.d/*.conf;
}

stream {
  resolver 1.1.1.1 valid=30s ipv6=off;

  log_format basic_stream '$remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received $session_time "$upstream_addr"';
  access_log /var/log/nginx/access.stream.log basic_stream;

  proxy_connect_timeout 5s;
  proxy_timeout 10m;

  js_import /etc/nginx/stream.d/minecraft_router.js;
  js_var $minecraft_server;

  include /etc/nginx/stream.d/*.conf;
}
