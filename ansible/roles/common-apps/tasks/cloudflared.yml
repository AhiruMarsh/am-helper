# cloudflared Settings

# vars example
# vars:
#   cloudflared_token: string
---
- name: Cloudflared - Create directory
  ansible.builtin.file:
    path: "/etc/apt/keyrings"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  when: ansible_facts['distribution'] == "Ubuntu"

- name: Cloudflared - Add GPG key
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflare-main.gpg
    dest: /etc/apt/keyrings/cloudflare-main.gpg
    owner: "root"
    group: "root"
    mode: "0644"
  register: cloudflared_gpg_key
  when: ansible_facts['distribution'] == "Ubuntu"

- name: Cloudflared - Add the repository to Apt sources
  ansible.builtin.copy:
    # noqa yaml[line-length]
    content: "deb [signed-by={{ cloudflared_gpg_key.dest }}] https://pkg.cloudflare.com/cloudflared {{ ansible_facts['distribution_release'] }} main"
    dest: /etc/apt/sources.list.d/cloudflared.list
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts['distribution'] == "Ubuntu"

- name: Cloudflared - Install cloudflared
  ansible.builtin.apt:
    name: cloudflared
    update_cache: true
    state: present

- name: Cloudflared - Set systemd service
  ansible.builtin.command: cloudflared service install {{ cloudflared_token }}
  register: cloudflared_service
  changed_when: cloudflared_service.rc == 0
  failed_when: cloudflared_service.rc not in [0,1]
  when: cloudflared_token is defined
