services:
  app:
    image: quay.io/prometheus/node-exporter:latest
    command:
      - "--path.rootfs=/host"
      - "--collector.systemd"
    network_mode: host
    pid: host
    restart: unless-stopped
    volumes:
      - "/:/host:ro,rslave"
      - "/var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro"
