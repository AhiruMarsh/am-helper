services:
  prometheus:
    image: prom/prometheus:v3.11.3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=https://prometheus.a-marsh.net
    volumes:
      - ./data/prometheus:/prometheus
      - ./prometheus:/etc/prometheus:ro
      - /etc/timezone:/etc/timezone:ro
    restart: always

  exporter-cloudflare:
    image: ghcr.io/lablabs/cloudflare-exporter:latest
    volumes:
      - /etc/timezone:/etc/timezone:ro
    environment:
      CF_ACCOUNTS: "{{ o11y_exporter_cloudflare_cf_accounts }}"
      CF_API_TOKEN: "{{ o11y_exporter_cloudflare_cf_api_token }}"
      FREE_TIER: false
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    volumes:
      - /etc/timezone:/etc/timezone:ro
    command: tunnel run --token "{{ o11y_cloudflared_token }}"
    restart: always
    depends_on:
      - prometheus
