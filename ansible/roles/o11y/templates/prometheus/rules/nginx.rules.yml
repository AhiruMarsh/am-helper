groups:
  - name: nginx
    rules:
      - alert: NginxDown
        expr: nginx_up{project="rpx"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          description: "Failed to scrape for more than 5 minutes."

      - alert: NginxConnectionHigh
        expr: nginx_connections_active{project="rpx"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          title: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Active connections are high (> 1000).\nCurrent is {{ $value }}{% endraw %}"

      - alert: NginxConnectionDropped
        expr: increase(nginx_connections_accepted{project="rpx"}[1m]) - increase(nginx_connections_handled{project="rpx"}[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          title: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Nginx is dropping connections.\nCurrent is {{ $value }}{% endraw %}"
