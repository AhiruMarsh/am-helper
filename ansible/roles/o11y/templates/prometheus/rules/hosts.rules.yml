groups:
  - name: hosts
    rules:
      - alert: HostDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          title: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Failed to scrape for more than 5 minutes.{% endraw %}"

      - alert: HostMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Node memory is filling up (< 10% left). Current is {{ $value }}{% endraw %}"

      - alert: HostSwap
        expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Swap is filling up (>80%). Current is {{ $value }}{% endraw %}"

      - alert: HostCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}CPU load (15m) is > 80%. Current is {{ $value }}{% endraw %}"

      # Please add ignored mountpoints in node_exporter parameters like
      # "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|run)($|/)".
      # Same rule using "node_filesystem_free_bytes" will fire when disk fills for non-root users.
      - alert: HostDiskSpace
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 10 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Disk is almost full (< 10% left). Current is {{ $value }}{% endraw %}"

      - alert: HostDiskInode
        expr: node_filesystem_files_free{mountpoint ="/rootfs"} / node_filesystem_files{mountpoint="/rootfs"} * 100 < 10 and ON (instance, device, mountpoint) node_filesystem_readonly{mountpoint="/rootfs"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Disk is almost running out of available inodes (< 10% left). Current is {{ $value }}{% endraw %}"

      - alert: HostOOM
        expr: increase(node_vmstat_oom_kill[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}OOM kill detected. Current is {{ $value }}{% endraw %}"

      - alert: HostSyncClock
        expr: min_over_time(node_timex_sync_status[1m]) == 0 and node_timex_maxerror_seconds >= 16
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{% raw %}{{ $labels.instance }}{% endraw %}"
          description: "{% raw %}Clock not synchronising. Current is {{ $value }}{% endraw %}"
