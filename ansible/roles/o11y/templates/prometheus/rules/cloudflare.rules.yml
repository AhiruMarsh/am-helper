groups:
  - name: cloudflare
    interval: 10m
    rules:
      # Worker
      - alert: CloudflareWorkerError
        expr: cloudflare_worker_errors_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          title: "{% raw %}{{ $labels.account }}{% endraw %}"
          description: "{% raw %}An error has occurred in a Cloudflare Worker within this account.\nCurrent is {{ $value }}{% endraw %}"
