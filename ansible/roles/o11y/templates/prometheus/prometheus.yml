global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/hosts.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "hosts"
    http_headers:
      CF-Access-Client-Id:
        values:
          - "47b2c772dac3a4d4ae409ec56f96d993.access"
      CF-Access-Client-Secret:
        secrets:
          - "{{ prom_client_secret_token }}"
    file_sd_configs:
      - files:
          - /etc/prometheus/scrape_configs/hosts.yml

  - job_name: "nginx"
    http_headers:
      CF-Access-Client-Id:
        values:
          - "47b2c772dac3a4d4ae409ec56f96d993.access"
      CF-Access-Client-Secret:
        secrets:
          - "{{ prom_client_secret_token }}"
    file_sd_configs:
      - files:
          - /etc/prometheus/scrape_configs/nginx.yml
