global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/**/*.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager.a-marsh.net
      scheme: https
      http_headers:
        CF-Access-Client-Id:
          values:
            - "47b2c772dac3a4d4ae409ec56f96d993.access"
        CF-Access-Client-Secret:
          secrets:
            - "{{ prom_client_secret_token }}"
    - static_configs:
        - targets:
            - alertmanager-prod-ap-northeast-0.grafana.net
      scheme: https
      basic_auth:
        username: "{{ o11y_alertmanager_username }}"
        password: "{{ o11y_alertmanager_password }}"

scrape_configs:
  - job_name: "hosts"
    http_headers:
      CF-Access-Client-Id:
        values:
          - "47b2c772dac3a4d4ae409ec56f96d993.access"
      CF-Access-Client-Secret:
        secrets:
          - "{{ prom_client_secret_token }}"
    file_sd_configs:
      - files:
          - /etc/prometheus/scrape_configs/hosts.yml
    relabel_configs:
      - source_labels: [ __address__ ]
        regex: "prom-(.+)\\.a-marsh\\.net(:\\d+)?"
        replacement: "$1"
        target_label: instance

  - job_name: "cloudflare"
    http_headers:
      CF-Access-Client-Id:
        values:
          - "47b2c772dac3a4d4ae409ec56f96d993.access"
      CF-Access-Client-Secret:
        secrets:
          - "{{ prom_client_secret_token }}"
    file_sd_configs:
      - files:
          - /etc/prometheus/scrape_configs/cloudflare.yml

  - job_name: "apps"
    http_headers:
      CF-Access-Client-Id:
        values:
          - "47b2c772dac3a4d4ae409ec56f96d993.access"
      CF-Access-Client-Secret:
        secrets:
          - "{{ prom_client_secret_token }}"
    file_sd_configs:
      - files:
          - /etc/prometheus/scrape_configs/apps.yml
    relabel_configs:
      - source_labels: [ __address__ ]
        regex: "prom-(.+)\\.a-marsh\\.net(:\\d+)?"
        replacement: "$1"
        target_label: instance
