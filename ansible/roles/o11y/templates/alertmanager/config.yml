route:
  receiver: default
  group_by: ["alertname", "job", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1d
  routes:
    - receiver: discord
      match_re:
        severity: "warning|critical"

receivers:
  - name: default
  - name: discord
    discord_configs:
      - webhook_url: "{{ alertmanager_discord_webhook_url }}"
        title: >-
          {% raw %}[{{ .CommonLabels.project }}] {{ if .CommonAnnotations.title }}{{ .CommonAnnotations.title }}{{ else }}{{ .CommonAnnotations.summary }}{{ end }} ({{ .CommonLabels.severity }}){% endraw %}
